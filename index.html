<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ipcalc — IP Subnet Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent:           #0099d5;
  --accent-dim:       rgba(0,153,213,0.12);
  --accent-border:    rgba(0,153,213,0.30);

  --bg:               #0f0f10;
  --bg2:              rgba(255,255,255,0.04);

  --btn-bg:           rgba(255,255,255,0.07);
  --btn-hover-bg:     rgba(255,255,255,0.13);
  --btn-border:       rgba(255,255,255,0.10);
  --btn-border-hover: rgba(255,255,255,0.22);

  --bar-bg:           rgba(13,13,15,0.92);
  --bar-border:       rgba(255,255,255,0.07);

  --fg:               #f0f0f0;
  --fg-muted:         #666;
  --fg-subtle:        rgba(255,255,255,0.35);

  --net-color:        #ff6b6b;
  --bin-color:        rgba(255,255,255,0.25);

  --radius:           10px;
  --radius-lg:        14px;
  --blur:             blur(16px);
}

body {
  font-family: 'Open Sans', ui-sans-serif, system-ui, sans-serif;
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.topbar {
  height: 50px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  background: var(--bar-bg);
  border-bottom: 1px solid var(--bar-border);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  position: sticky;
  top: 0;
  z-index: 50;
}
.logo {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -0.3px;
  flex-shrink: 0;
}
.logo span { color: rgba(255,255,255,0.22); }
.topbar-sep { width:1px; height:18px; background:var(--bar-border); flex-shrink:0; }
.topbar-desc { font-size:12.5px; color:var(--fg-subtle); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.container { max-width:860px; margin:0 auto; padding:36px 20px 80px; }

.form-card {
  background: var(--bg2);
  border: 1px solid var(--btn-border);
  border-radius: var(--radius-lg);
  padding: 24px 28px;
  margin-bottom: 28px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr auto;
  gap: 12px;
  align-items: end;
}
.field { display:flex; flex-direction:column; gap:6px; }
.field label {
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 0.09em;
}
.field input {
  height: 36px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: var(--radius);
  color: var(--fg);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13.5px;
  padding: 0 12px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  width: 100%;
}
.field input::placeholder { color: var(--fg-muted); }
.field input:focus { border-color: var(--accent); background: rgba(0,153,213,0.06); }
.field input:hover:not(:focus) { border-color: var(--btn-border-hover); background: var(--btn-hover-bg); }

.calc-btn {
  height: 36px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-family: 'Open Sans', sans-serif;
  font-size: 13px;
  font-weight: 600;
  padding: 0 22px;
  cursor: pointer;
  white-space: nowrap;
  letter-spacing: 0.02em;
  transition: opacity 0.15s, transform 0.1s;
  flex-shrink: 0;
}
.calc-btn:hover { opacity: 0.85; }
.calc-btn:active { transform: scale(0.96); }

#results { display:none; }
#results.visible { display:block; }

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}
.section-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--fg-subtle);
  text-transform: uppercase;
  letter-spacing: 0.09em;
}
.toggle-bin {
  height: 28px;
  padding: 0 12px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: var(--radius);
  color: var(--fg-muted);
  font-size: 11.5px;
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: all 0.15s;
}
.toggle-bin:hover { background:var(--btn-hover-bg); border-color:var(--btn-border-hover); color:var(--fg); }
.toggle-bin.active { border-color:var(--accent-border); color:var(--accent); background:var(--accent-dim); }

.result-card {
  background: var(--bg2);
  border: 1px solid var(--btn-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  animation: fadeIn 0.22s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

table.rtable { width:100%; border-collapse:collapse; }
table.rtable tr { border-bottom:1px solid var(--bar-border); transition:background 0.1s; }
table.rtable tr:last-child { border-bottom:none; }
table.rtable tr.net-section td:first-child { border-left:2px solid var(--accent); }
table.rtable td { padding:10px 16px; font-family:'JetBrains Mono',monospace; font-size:13px; vertical-align:middle; }
td.lbl { width:120px; font-size:10.5px; text-transform:uppercase; letter-spacing:0.08em; color:var(--fg-muted); font-weight:400; white-space:nowrap; }
td.val { color:var(--fg); font-weight:500; position:relative; }
.copy-wrap {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  cursor: pointer;
  border-radius: 6px;
  padding: 2px 6px;
  margin: -2px -6px;
  transition: background 0.12s;
  user-select: none;
}
.copy-wrap:hover { background:var(--btn-hover-bg); }
.copy-wrap:hover .ci { opacity:1; }
.ci { opacity:0; font-size:10px; color:var(--fg-muted); font-family:'Open Sans',sans-serif; transition:opacity 0.12s; }
.copy-flash { font-family:'Open Sans',sans-serif; font-size:10px; color:var(--accent); position:absolute; right:16px; top:50%; transform:translateY(-50%); pointer-events:none; opacity:0; transition:opacity 0.2s; }
.copy-flash.show { opacity:1; }
td.bin-col { font-size:11.5px; font-weight:300; color:var(--bin-color); letter-spacing:0.06em; cursor:pointer; transition:background 0.1s; }
td.bin-col:hover { background:var(--btn-bg); }
.bn { color:var(--net-color); }
td.meta { text-align:right; padding-right:18px; white-space:nowrap; }
td.divider { padding:0; height:1px; background:rgba(255,255,255,0.05); }

.badge { display:inline-flex; align-items:center; font-size:10px; font-family:'Open Sans',sans-serif; font-weight:600; padding:3px 9px; border-radius:99px; letter-spacing:0.05em; text-transform:uppercase; }
.badge-class { background:rgba(0,153,213,0.12); color:#0099d5; border:1px solid rgba(0,153,213,0.25); }
.badge-priv  { background:rgba(34,197,120,0.10); color:#22c578; border:1px solid rgba(34,197,120,0.22); }
.badge-pub   { background:rgba(240,160,74,0.10); color:#f0a04a; border:1px solid rgba(240,160,74,0.22); }
.badge-mc    { background:rgba(255,107,107,0.10); color:#ff6b6b; border:1px solid rgba(255,107,107,0.22); }
.badges { display:flex; gap:5px; justify-content:flex-end; flex-wrap:wrap; }

.subnet-section { margin-top:24px; animation:fadeIn 0.22s ease; }
.subnet-card { background:var(--bg2); border:1px solid var(--btn-border); border-radius:var(--radius-lg); padding:20px 24px; }
.subnet-bar { display:flex; height:26px; border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,0.06); margin:12px 0 10px; }
.subnet-seg { height:100%; display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:10px; font-weight:500; transition:opacity 0.15s; overflow:hidden; }
.subnet-seg:hover { opacity:0.8; }
.subnet-info { font-size:12.5px; color:rgba(255,255,255,0.35); font-family:'JetBrains Mono',monospace; }
.subnet-info span { color:var(--accent); }

.history-section { margin-top:28px; }
.history-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.clear-btn { background:none; border:none; color:var(--fg-muted); font-size:11.5px; cursor:pointer; font-family:'Open Sans',sans-serif; padding:0; transition:color 0.15s; }
.clear-btn:hover { color:var(--net-color); }
.history-list { display:flex; flex-wrap:wrap; gap:7px; }
.history-item { height:30px; padding:0 13px; background:var(--btn-bg); border:1px solid var(--btn-border); border-radius:var(--radius); font-family:'JetBrains Mono',monospace; font-size:12px; color:rgba(255,255,255,0.45); cursor:pointer; transition:all 0.15s; display:flex; align-items:center; white-space:nowrap; }
.history-item:hover { border-color:var(--accent-border); color:var(--accent); background:var(--accent-dim); }

@media (max-width:660px) {
  .topbar-desc { display:none; }
  .container { padding:24px 14px 60px; }
  .form-card { padding:18px; }
  .form-grid { grid-template-columns:1fr 1fr; gap:10px; }
  .form-grid .calc-btn-wrap { grid-column:1/-1; }
  .calc-btn { width:100%; }
  td.bin-col { display:none !important; }
  td.lbl { width:90px; font-size:9.5px; }
  td.val { font-size:12px; }
  td.meta { display:none; }
}

#cheatTable td { padding:8px 16px; }
#cheatTable tr:hover { background:var(--btn-bg); }

[data-theme="light"] {
  --accent:           #0077aa;
  --accent-dim:       rgba(0,119,170,0.12);
  --accent-border:    rgba(0,119,170,0.35);
  --bg:               #f0f2f5;
  --bg2:              rgba(255,255,255,0.80);
  --btn-bg:           rgba(0,0,0,0.07);
  --btn-hover-bg:     rgba(0,0,0,0.13);
  --btn-border:       rgba(0,0,0,0.18);
  --btn-border-hover: rgba(0,0,0,0.35);
  --bar-bg:           rgba(255,255,255,0.96);
  --bar-border:       rgba(0,0,0,0.14);
  --fg:               #0d0f11;
  --fg-muted:         #555;
  --fg-subtle:        rgba(0,0,0,0.55);
  --net-color:        #c0202a;
  --bin-color:        rgba(0,0,0,0.40);
}
[data-theme="light"] .result-card { background: #fff; border-color: rgba(0,0,0,0.14); }
[data-theme="light"] table.rtable tr { border-bottom-color: rgba(0,0,0,0.08); }
[data-theme="light"] td.divider { background: rgba(0,0,0,0.08); }
[data-theme="light"] .form-card { background: rgba(255,255,255,0.75); border-color: rgba(0,0,0,0.14); }
[data-theme="light"] .subnet-card { background: #fff; border-color: rgba(0,0,0,0.14); }
[data-theme="light"] .history-item { color: #333; }
[data-theme="light"] .badge-class { background:rgba(0,119,170,0.12); color:#005f8a; border-color:rgba(0,119,170,0.30); }
[data-theme="light"] .badge-priv  { background:rgba(20,160,80,0.12); color:#0e7a3c; border-color:rgba(20,160,80,0.30); }
[data-theme="light"] .badge-pub   { background:rgba(190,100,0,0.12); color:#8a4800; border-color:rgba(190,100,0,0.30); }
[data-theme="light"] .badge-mc   { background:rgba(180,30,30,0.10); color:#9a1515; border-color:rgba(180,30,30,0.25); }
.theme-btn {
  width:28px; height:28px;
  background: var(--btn-bg);
  border: 1px solid var(--btn-border);
  border-radius: 8px;
  color: var(--fg-subtle);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.theme-btn:hover { background:var(--btn-hover-bg); border-color:var(--btn-border-hover); color:var(--fg); }
.theme-btn.active { background:var(--accent-dim); border-color:var(--accent-border); color:var(--accent); }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">ip<span>/</span>calc</div>
  <div class="topbar-sep"></div>
  <div class="topbar-desc" style="flex:1">IP address &amp; subnet calculator · CIDR · binary visualization</div>
  <button class="theme-btn" id="themeBtn" title="Toggle theme" onclick="cycleTheme()"><i class="fa-solid fa-moon"></i></button>
</div>

<div class="container">

  <div class="form-card">
    <form id="calcForm">
      <div class="form-grid">
        <div class="field">
          <label>Address / CIDR</label>
          <input type="text" id="host" placeholder="192.168.0.1 or /24" value="192.168.0.1" autocomplete="off" spellcheck="false">
        </div>
        <div class="field">
          <label>Netmask</label>
          <input type="text" id="mask1" placeholder="24 or 255.255.255.0" value="24" autocomplete="off" spellcheck="false">
        </div>
        <div class="field">
          <label>2nd Mask <span style="font-weight:400;opacity:.5">(optional)</span></label>
          <input type="text" id="mask2" placeholder="sub / supernet" autocomplete="off" spellcheck="false">
        </div>
        <div class="calc-btn-wrap" style="display:flex;align-items:flex-end">
          <button type="submit" class="calc-btn"><i class="fa-solid fa-play" style="font-size:11px;margin-right:6px"></i>Calculate</button>
        </div>
      </div>
    </form>
  </div>

  <div id="results">
    <div class="results-header">
      <span class="section-label"><i class="fa-solid fa-network-wired" style="margin-right:6px"></i>Result</span>
      <button class="toggle-bin active" id="toggleBin"><i class="fa-solid fa-code" style="margin-right:5px"></i>binary</button>
    </div>
    <div class="result-card">
      <table class="rtable" id="resultTable"></table>
    </div>
    <div id="subnetSection" class="subnet-section" style="display:none"></div>
  </div>

  <div id="historySection" class="history-section" style="display:none">
    <div class="history-header">
      <span class="section-label"><i class="fa-solid fa-clock-rotate-left" style="margin-right:6px"></i>Recent</span>
      <button class="clear-btn" id="clearHistory"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div class="history-list" id="historyList"></div>
  </div>


  <div class="history-section" style="margin-top:28px">
    <div class="history-header">
      <span class="section-label"><i class="fa-solid fa-table-list" style="margin-right:6px"></i>Subnet cheat sheet</span>
      <button class="clear-btn" id="toggleCheat" onclick="toggleCheat()"><i class="fa-solid fa-chevron-up"></i></button>
    </div>
    <div id="cheatBody">
      <div class="result-card">
        <table class="rtable" id="cheatTable"></table>
      </div>
    </div>
  </div>

</div>

<script>
let showBin = true;
let history = [];
try { history = JSON.parse(localStorage.getItem('ipcalc_h') || '[]'); } catch(e){}

function ipToInt(ip) {
  return ip.split('.').reduce((n,o)=>(n<<8)+parseInt(o,10),0)>>>0;
}
function intToIp(n) {
  return [(n>>>24)&255,(n>>>16)&255,(n>>>8)&255,n&255].join('.');
}
function intToBin32(n) {
  let b=n.toString(2); return '0'.repeat(32-b.length)+b;
}
function formatBin(bin,ml) {
  let out='';
  for(let oct=0;oct<4;oct++){
    if(oct) out+='<span style="color:rgba(255,255,255,0.12)">.</span>';
    for(let b=0;b<8;b++){
      let p=oct*8+b, c=bin[p];
      out += p<ml ? `<span class="bn">${c}</span>` : c;
    }
  }
  return out;
}
function getMask(s){
  if(!s) return null;
  s=s.trim();
  if(s.indexOf('.')!==-1){
    let m=ipToInt(s),len=0,t=m;
    while(t&0x80000000){len++;t=(t<<1)>>>0;}
    return{int:m,len};
  }else{
    let len=parseInt(s,10);
    if(isNaN(len)||len<0||len>32) return null;
    return{int:len===0?0:((0xFFFFFFFF<<(32-len))>>>0),len};
  }
}
function getClass(ip){
  let f=(ip>>>24)&255;
  if(f<128) return'Class A';
  if(f<192) return'Class B';
  if(f<224) return'Class C';
  if(f<240) return'Class D';
  return'Class E';
}
function getType(ip){
  let s=intToIp(ip),f=(ip>>>24)&255;
  if(s.startsWith('10.')) return'private';
  if(s.startsWith('172.')){let x=parseInt(s.split('.')[1]);if(x>=16&&x<=31)return'private';}
  if(s.startsWith('192.168.')) return'private';
  if(s.startsWith('127.')) return'loopback';
  if(s.startsWith('169.254.')) return'link-local';
  if(f>=224&&f<240) return'multicast';
  return'public';
}
function copyText(txt,el){
  navigator.clipboard.writeText(txt).then(()=>{
    let td=el.closest('td');
    let fl=td&&td.querySelector('.copy-flash');
    if(fl){fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),1300);}
  });
}
function row(label,ipInt,cidr,metaHtml,netSec){
  let ip=intToIp(ipInt);
  let disp=ip;
  if(label==='Netmask') disp=ip+' = /'+cidr;
  if(label==='Network') disp=ip+'/'+cidr;
  let bin=formatBin(intToBin32(ipInt),cidr);
  let binRaw=intToBin32(ipInt);
  return`<tr class="${netSec?'net-section':''}">
    <td class="lbl">${label}</td>
    <td class="val">
      <span class="copy-wrap" onclick="copyText('${disp}',this)" title="Copy">
        ${disp}<span class="ci"><i class="fa-regular fa-copy"></i></span>
      </span>
      <span class="copy-flash">copied</span>
    </td>
    <td class="bin-col" onclick="copyText('${binRaw}',this)" title="Copy binary" style="display:${showBin?'':'none'}">${bin}</td>
    <td class="meta">${metaHtml||''}</td>
  </tr>`;
}
function hostsRow(hosts){
  return`<tr class="net-section">
    <td class="lbl">Hosts/Net</td>
    <td class="val">
      <span class="copy-wrap" onclick="copyText('${hosts}',this)" title="Copy">
        ${hosts.toLocaleString()}<span class="ci"><i class="fa-regular fa-copy"></i></span>
      </span>
      <span class="copy-flash">copied</span>
    </td>
    <td class="bin-col" style="display:${showBin?'':'none'}"></td>
    <td class="meta"></td>
  </tr>`;
}
function badge(cls,txt){ return`<span class="badge ${cls}">${txt}</span>`; }

function renderSubnet(netInt,m1,m2){
  let sec=document.getElementById('subnetSection');
  if(!m2||m2.len<=m1.len||m2.len>32){sec.style.display='none';return;}
  let diff=m2.len-m1.len;
  let numSub=Math.pow(2,diff);
  let hps=m2.len<31?Math.pow(2,32-m2.len)-2:(m2.len===31?2:1);
  let blockSize=Math.pow(2,32-m2.len);
  let cols=['#0099d5','#22c578','#f0a04a','#ff6b6b','#b07ef7','#4adfe0','#e0a04a','#d54f6b'];
  let maxShow=Math.min(numSub,8);
  let segs='';
  for(let i=0;i<maxShow;i++){
    let sn=(netInt+i*blockSize)>>>0;
    let ip=intToIp(sn);
    let col=cols[i%cols.length];
    let pct=100/maxShow;
    let lbl=numSub<=8?ip:(i<maxShow-1?ip:'…');
    segs+=`<div class="subnet-seg" style="width:${pct}%;background:${col}18;border-right:1px solid ${col}30;color:${col}" title="${ip}/${m2.len}">${lbl}</div>`;
  }
  sec.style.display='block';
  sec.innerHTML=`<div class="subnet-card">
    <div class="results-header">
      <span class="section-label">Subnet visualization — /${m2.len} within /${m1.len}</span>
    </div>
    <div class="subnet-bar">${segs}</div>
    <div class="subnet-info">
      <span>${numSub.toLocaleString()}</span> subnets &nbsp;·&nbsp;
      <span>${hps.toLocaleString()}</span> hosts each &nbsp;·&nbsp;
      total <span>${(numSub*hps).toLocaleString()}</span> hosts
    </div>
  </div>`;
}

function renderHistory(){
  let sec=document.getElementById('historySection');
  let list=document.getElementById('historyList');
  if(!history.length){sec.style.display='none';return;}
  sec.style.display='block';
  list.innerHTML=history.map(h=>`<div class="history-item" onclick="loadHistory('${h}')">${h}</div>`).join('');
}
function loadHistory(e){
  let[ip,cidr]=e.split('/');
  document.getElementById('host').value=ip;
  document.getElementById('mask1').value=cidr;
  document.getElementById('mask2').value='';
  calculate();
}
function calculate(){
  let hi=document.getElementById('host').value.trim();
  let mi=document.getElementById('mask1').value.trim()||'24';
  let m2i=document.getElementById('mask2').value.trim();
  if(!hi) return;
  let parts=hi.split('/');
  if(parts.length===2){hi=parts[0].trim();mi=parts[1].trim();document.getElementById('mask1').value=mi;}
  let ipInt=ipToInt(hi);
  let m1=getMask(mi); if(!m1) return;
  let m2=m2i?getMask(m2i):null;
  let mInt=m1.int,cidr=m1.len;
  let netInt=(ipInt&mInt)>>>0;
  let wildInt=(~mInt)>>>0;
  let bcInt=(netInt|wildInt)>>>0;
  let hMinInt=cidr<31?(netInt+1)>>>0:netInt;
  let hMaxInt=cidr<31?(bcInt-1)>>>0:bcInt;
  let hosts=cidr<31?Math.max(0,bcInt-netInt-1):(cidr===31?2:1);
  let cls=getClass(netInt);
  let type=getType(ipInt);
  let clsBadge=badge('badge-class',cls);
  let typeBadge='';
  if(type==='private')   typeBadge=badge('badge-priv','Private');
  if(type==='public')    typeBadge=badge('badge-pub','Public');
  if(type==='multicast') typeBadge=badge('badge-mc','Multicast');
  if(type==='loopback')  typeBadge=badge('badge-class','Loopback');
  if(type==='link-local')typeBadge=badge('badge-class','Link-local');
  let html='';
  html+=row('Address',  ipInt,  cidr,'',false);
  html+=row('Netmask',  mInt,   cidr,'',false);
  html+=row('Wildcard', wildInt,cidr,'',false);
  html+=`<tr><td class="divider" colspan="4"></td></tr>`;
  html+=row('Network',  netInt, cidr,`<div class="badges">${clsBadge}${typeBadge}</div>`,true);
  html+=row('Broadcast',bcInt,  cidr,'',false);
  html+=row('Host min', hMinInt,cidr,'',false);
  html+=row('Host max', hMaxInt,cidr,'',false);
  html+=hostsRow(hosts);
  document.getElementById('resultTable').innerHTML=html;
  document.getElementById('results').classList.add('visible');
  updateBin();
  renderSubnet(netInt,m1,m2);
  let entry=`${intToIp(ipInt)}/${cidr}`;
  history=[entry,...history.filter(h=>h!==entry)].slice(0,8);
  try{localStorage.setItem('ipcalc_h',JSON.stringify(history));}catch(e){}
  renderHistory();
  updateUrl(intToIp(ipInt), cidr, m2i||'');
}
function updateBin(){
  document.querySelectorAll('.bin-col').forEach(td=>{td.style.display=showBin?'':'none';});
  document.getElementById('toggleBin').classList.toggle('active',showBin);
}
document.getElementById('calcForm').addEventListener('submit',e=>{e.preventDefault();calculate();});
['host','mask1','mask2'].forEach(id=>{
  document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();calculate();}});
});
document.getElementById('toggleBin').addEventListener('click',()=>{showBin=!showBin;updateBin();});
document.getElementById('clearHistory').addEventListener('click',()=>{
  history=[];try{localStorage.removeItem('ipcalc_h');}catch(e){}renderHistory();
});

let cheatVisible=true;
function toggleCheat(){
  cheatVisible=!cheatVisible;
  document.getElementById('cheatBody').style.display=cheatVisible?'':'none';
  document.getElementById('toggleCheat').innerHTML=cheatVisible?'<i class="fa-solid fa-chevron-up"></i>':'<i class="fa-solid fa-chevron-down"></i>';
}
function cheatCopy(txt,el){
  navigator.clipboard.writeText(txt).then(()=>{
    let td=el.closest('td');
    let fl=td&&td.querySelector('.copy-flash');
    if(fl){fl.classList.add('show');setTimeout(()=>fl.classList.remove('show'),1300);}
  });
}
function buildCheat(){
  let html='';
  for(let[cidr,mask,hosts,note] of MASKS){
    let noteHtml=note?`<span class="badge badge-class" style="font-size:9px;padding:2px 7px">${note}</span>`:'';
    html+=`<tr>
      <td class="lbl" style="color:var(--accent);font-size:13px;font-weight:600;width:50px">/${cidr}</td>
      <td class="val" style="font-weight:400">
        <span class="copy-wrap" onclick="cheatCopy('${mask}',this)" title="Copy netmask">
          ${mask}<span class="ci"><i class="fa-regular fa-copy"></i></span>
        </span><span class="copy-flash">copied</span>
      </td>
      <td class="val" style="color:var(--fg-subtle);font-weight:400;font-size:12px">
        <span class="copy-wrap" onclick="cheatCopy('${cidr}',this)" title="Copy CIDR prefix">
          /${cidr}<span class="ci"><i class="fa-regular fa-copy"></i></span>
        </span><span class="copy-flash">copied</span>
      </td>
      <td class="val" style="color:var(--fg-muted);font-size:12px">${hosts.toLocaleString()} hosts</td>
      <td class="meta">${noteHtml}</td>
    </tr>`;
  }
  document.getElementById('cheatTable').innerHTML=html;
}
buildCheat();

// ── Theme ──
const themes=['dark','light'];
let themeIdx=0;
function applyTheme(idx){
  themeIdx=idx;
  document.documentElement.setAttribute('data-theme',themes[idx]);
  document.getElementById('themeBtn').innerHTML=idx===0?'<i class="fa-solid fa-moon"></i>':'<i class="fa-solid fa-sun"></i>';
  try{localStorage.setItem('ipcalc_theme',idx);}catch(e){}
}
function cycleTheme(){ applyTheme((themeIdx+1)%themes.length); }
(function initTheme(){
  let saved=0;
  try{saved=parseInt(localStorage.getItem('ipcalc_theme')||'0');}catch(e){}
  applyTheme(isNaN(saved)?0:saved);
})();

// ── URL sync ──
function updateUrl(ip,mask,mask2){
  let params=new URLSearchParams();
  params.set('ip',ip);
  params.set('mask',mask);
  if(mask2) params.set('mask2',mask2);
  history.pushState&&window.history.replaceState({},'','?'+params.toString());
}
function loadFromUrl(){
  let p=new URLSearchParams(window.location.search);
  if(p.get('ip')){
    document.getElementById('host').value=p.get('ip');
    if(p.get('mask')) document.getElementById('mask1').value=p.get('mask');
    if(p.get('mask2')) document.getElementById('mask2').value=p.get('mask2');
    return true;
  }
  return false;
}

renderHistory();
if(!loadFromUrl()) calculate(); else calculate();
